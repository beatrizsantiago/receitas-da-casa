server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Compressão
  gzip on;
  gzip_vary on;
  gzip_min_length 1024;
  gzip_types
    text/plain
    text/css
    text/javascript
    application/javascript
    application/json
    application/xml
    image/svg+xml;

  # Assets com hash no nome → cache longo e imutável
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # SPA fallback: qualquer rota cai no index.html
  location / {
    try_files $uri $uri/ /index.html;
  }
}
