name: CI/CD

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io

jobs:
  # ─────────────────────────────────────────
  # Backend — NestJS + Prisma
  # ─────────────────────────────────────────
  backend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Define nome da imagem (lowercase)
        id: img
        run: echo "name=${REGISTRY}/${GITHUB_REPOSITORY,,}-backend" >> "$GITHUB_OUTPUT"

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login no GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build e push
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ steps.img.outputs.name }}:latest
            ${{ steps.img.outputs.name }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy no CapRover
        run: |
          npx caprover deploy \
            --caproverUrl "${{ secrets.CAPROVER_SERVER }}" \
            --appToken "${{ secrets.CAPROVER_BACKEND_APP_TOKEN }}" \
            --caproverApp "${{ vars.CAPROVER_BACKEND_APP }}" \
            --imageName "${{ steps.img.outputs.name }}:${{ github.sha }}"

  # ─────────────────────────────────────────
  # Frontend — React + Vite (servido por nginx)
  # ─────────────────────────────────────────
  frontend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Define nome da imagem (lowercase)
        id: img
        run: echo "name=${REGISTRY}/${GITHUB_REPOSITORY,,}-frontend" >> "$GITHUB_OUTPUT"

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login no GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build e push
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          build-args: |
            VITE_API_URL=${{ vars.VITE_API_URL }}
          tags: |
            ${{ steps.img.outputs.name }}:latest
            ${{ steps.img.outputs.name }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy no CapRover
        run: |
          npx caprover deploy \
            --caproverUrl "${{ secrets.CAPROVER_SERVER }}" \
            --appToken "${{ secrets.CAPROVER_FRONTEND_APP_TOKEN }}" \
            --caproverApp "${{ vars.CAPROVER_FRONTEND_APP }}" \
            --imageName "${{ steps.img.outputs.name }}:${{ github.sha }}"
